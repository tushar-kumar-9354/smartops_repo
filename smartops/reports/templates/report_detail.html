<!DOCTYPE html>
<html>
<head><title>{{ report.title }}</title></head>
<body>
  <h2>Report: {{ report.title }}</h2>
  <p><b>Summary:</b></p>
  <pre>{{ report.summary }}</pre>

  {% if report.chart_path %}
    <img src="/{{ report.chart_path }}" alt="Report Chart" width="600">
  {% endif %}
</body>
</html>
